name: Publicar Mavi SFTP

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Baixar o projeto
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Conferir versao da tag
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "A tag ${{ github.ref_name }} nao corresponde a versao $version do package.json."
          }

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar e publicar a Release
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
